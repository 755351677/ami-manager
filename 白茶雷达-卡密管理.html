<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>白茶雷达-卡密管理</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #f5f7f0 0%, #e8efe5 100%);
      min-height: 100vh;
      padding: 30px;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding: 20px 28px;
      background: linear-gradient(135deg, #ffffff 0%, #f9faf7 100%);
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(100, 120, 80, 0.08);
    }
    .header h1 {
      font-size: 22px;
      color: #4a5d3a;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header h1::before {
      content: '🍃';
      font-size: 26px;
    }
    .btn-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .btn {
      padding: 10px 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.25s ease;
    }
    .btn-primary {
      background: linear-gradient(135deg, #6b8e4e 0%, #4a6b3a 100%);
      color: #fff;
      box-shadow: 0 4px 12px rgba(106, 142, 78, 0.3);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(106, 142, 78, 0.4);
    }
    .btn-blue {
      background: linear-gradient(135deg, #5b8bd4 0%, #3d6bb8 100%);
      color: #fff;
      box-shadow: 0 4px 12px rgba(91, 139, 212, 0.3);
    }
    .btn-blue:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(91, 139, 212, 0.4);
    }
    .btn-green {
      background: linear-gradient(135deg, #52c41a 0%, #389d0c 100%);
      color: #fff;
      box-shadow: 0 4px 12px rgba(82, 196, 26, 0.3);
    }
    .btn-green:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(82, 196, 26, 0.4);
    }
    .btn-purple {
      background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%);
      color: #fff;
      box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
    }
    .btn-purple:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(139, 92, 246, 0.4);
    }
    .filters {
      background: #fff;
      padding: 20px 24px;
      border-radius: 14px;
      margin-bottom: 20px;
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      align-items: center;
      box-shadow: 0 2px 12px rgba(100, 120, 80, 0.06);
      border: 1px solid rgba(106, 142, 78, 0.1);
    }
    .filters input {
      flex: 1;
      min-width: 180px;
      padding: 10px 14px;
      border: 1.5px solid #e0e5db;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.2s;
      background: #fafcf8;
    }
    .filters input:focus {
      outline: none;
      border-color: #6b8e4e;
      background: #fff;
    }
    .filters select {
      padding: 10px 14px;
      border: 1.5px solid #e0e5db;
      border-radius: 8px;
      font-size: 14px;
      min-width: 110px;
      background: #fafcf8;
      color: #4a5d3a;
      cursor: pointer;
    }
    .filters select:focus {
      outline: none;
      border-color: #6b8e4e;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(100, 120, 80, 0.08);
      border: 1px solid rgba(106, 142, 78, 0.08);
    }
    .table {
      width: 100%;
      border-collapse: collapse;
    }
    .table th {
      padding: 14px 18px;
      text-align: left;
      font-weight: 600;
      color: #4a5d3a;
      background: linear-gradient(135deg, #f5f7f0 0%, #eaeef3 100%);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .table td {
      padding: 14px 18px;
      border-bottom: 1px solid #f0f2eb;
      font-size: 14px;
      color: #3d3d3d;
    }
    .table tbody tr {
      transition: background 0.2s;
    }
    .table tbody tr:hover {
      background: #fafcf8;
    }
    .table tbody tr:last-child td {
      border-bottom: none;
    }
    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-success {
      background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%);
      color: #28a745;
    }
    .badge-default {
      background: linear-gradient(135deg, #f0f0f0 0%, #e0e0e0 100%);
      color: #888;
    }
    .badge-time {
      background: linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%);
      color: #3b82f6;
    }
    .badge-count {
      background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
      color: #d97706;
    }
    .actions {
      display: flex;
      gap: 6px;
    }
    .btn-small {
      padding: 5px 11px;
      font-size: 11px;
      border-radius: 6px;
    }
    .btn-edit {
      background: linear-gradient(135deg, #e0e5db 0%, #d0d7cb 100%);
      color: #4a5d3a;
    }
    .btn-edit:hover {
      background: linear-gradient(135deg, #d0d7cb 0%, #c0c7bb 100%);
    }
    .btn-del {
      background: linear-gradient(135deg, #ffe0e0 0%, #ffc0c0 100%);
      color: #c0392b;
    }
    .btn-del:hover {
      background: linear-gradient(135deg, #ffc0c0 0%, #ffa0a0 100%);
    }
    .copy-btn {
      color: #6b8e4e;
      cursor: pointer;
      margin-left: 8px;
      font-size: 14px;
      transition: transform 0.2s;
      display: inline-block;
    }
    .copy-btn:hover {
      transform: scale(1.2);
    }
    .empty {
      text-align: center;
      padding: 80px 20px;
      color: #999;
    }
    .empty::before {
      content: '🍃';
      font-size: 48px;
      display: block;
      margin-bottom: 16px;
    }
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(4px);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal-overlay.active {
      display: flex;
    }
    .modal {
      background: #fff;
      border-radius: 18px;
      padding: 28px;
      width: 90%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }
    .modal h3 {
      margin-bottom: 24px;
      font-size: 18px;
      color: #4a5d3a;
      font-weight: 600;
    }
    .form-group {
      margin-bottom: 18px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      color: #5a6d4a;
      font-weight: 500;
    }
    .form-group input, .form-group select {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #e0e5db;
      border-radius: 10px;
      font-size: 14px;
      transition: border-color 0.2s;
      background: #fafcf8;
    }
    .form-group input:focus, .form-group select:focus {
      outline: none;
      border-color: #6b8e4e;
      background: #fff;
    }
    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 28px;
    }
    .btn-cancel {
      background: #f0f0f0;
      color: #666;
      padding: 10px 20px;
    }
    .btn-cancel:hover {
      background: #e0e0e0;
    }
    .row-used {
      opacity: 0.55;
      background: #fafafa;
    }
    .row-used td {
      text-decoration: line-through;
      color: #999;
    }
    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #6b8e4e;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>白茶雷达 - 卡密管理</h1>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="openModal()">+ 添加卡密</button>
        <button class="btn btn-blue" onclick="copySelected()">📋 复制选中</button>
        <button class="btn btn-green" onclick="batchMarkUsed()">✓ 批量已用</button>
        <button class="btn btn-purple" onclick="openBatchNoteModal()">📝 批量备注</button>
      </div>
    </div>

    <div class="filters">
      <input type="text" id="searchInput" placeholder="🔍 搜索卡密/备注..." oninput="render()">
      <select id="typeFilter" onchange="render()">
        <option value="">全部类型</option>
        <option value="时间">时间卡密</option>
        <option value="次数">次数卡密</option>
      </select>
      <select id="statusFilter" onchange="render()">
        <option value="">全部状态</option>
        <option value="可用">可用</option>
        <option value="已用">已用</option>
      </select>
    </div>

    <div class="card">
      <table class="table" id="table">
        <thead>
          <tr>
            <th style="width:50px"><input type="checkbox" id="selectAll" onchange="toggleSelectAll()"></th>
            <th>卡密</th>
            <th>类型</th>
            <th>备注</th>
            <th>状态</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
      <div class="empty" id="empty" style="display:none">暂无卡密，点击上方按钮添加</div>
    </div>
  </div>

  <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <h3 id="modalTitle">添加卡密</h3>
      <div class="form-group">
        <label>卡密</label>
        <input type="text" id="kamiInput" placeholder="请输入卡密">
      </div>
      <div class="form-group">
        <label>类型</label>
        <select id="typeInput">
          <option value="时间">时间卡密</option>
          <option value="次数">次数卡密</option>
        </select>
      </div>
      <div class="form-group">
        <label>备注</label>
        <input type="text" id="noteInput" placeholder="可选">
      </div>
      <div class="form-group">
        <label>状态</label>
        <select id="statusInput">
          <option value="可用">可用</option>
          <option value="已用">已用</option>
        </select>
      </div>
      <div class="modal-footer">
        <button class="btn btn-cancel" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" onclick="save()">保存</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="batchNoteModal" onclick="closeBatchNoteModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <h3>批量备注</h3>
      <div class="form-group">
        <label>备注内容</label>
        <input type="text" id="batchNoteInput" placeholder="输入备注内容">
      </div>
      <div class="modal-footer">
        <button class="btn btn-cancel" onclick="closeBatchNoteModal()">取消</button>
        <button class="btn btn-primary" onclick="applyBatchNote()">确定</button>
      </div>
    </div>
  </div>

  <script>
    let cards = JSON.parse(localStorage.getItem('kamiCards') || '[]');
    let selected = [];

    function toggleSelect(index) {
      const idx = selected.indexOf(index);
      if (idx > -1) {
        selected.splice(idx, 1);
      } else {
        selected.push(index);
      }
      render();
    }

    function toggleSelectAll() {
      const checked = document.getElementById('selectAll').checked;
      const search = document.getElementById('searchInput').value.toLowerCase();
      const typeFilter = document.getElementById('typeFilter').value;
      const statusFilter = document.getElementById('statusFilter').value;
      const visibleCards = cards.filter(c => {
        const matchSearch = c.kami.toLowerCase().includes(search) || (c.note && c.note.toLowerCase().includes(search));
        const matchType = !typeFilter || c.type === typeFilter;
        const matchStatus = !statusFilter || c.status === statusFilter;
        return matchSearch && matchType && matchStatus && c.status === '可用';
      });
      if (checked) {
        selected = visibleCards.map((c) => cards.indexOf(c));
      } else {
        selected = [];
      }
      render();
    }

    function batchMarkUsed() {
      if (selected.length === 0) {
        alert('请先选择卡密');
        return;
      }
      if (confirm('确认将 ' + selected.length + ' 条卡密标记为已用？')) {
        selected.forEach(i => {
          if (cards[i].status === '可用') {
            cards[i].status = '已用';
          }
        });
        selected = [];
        saveToStorage();
        render();
      }
    }

    function copySelected() {
      if (selected.length === 0) {
        alert('请先选择卡密');
        return;
      }
      const kamis = selected.map(i => cards[i].kami).join('\n');
      navigator.clipboard.writeText(kamis).then(() => {
        alert('已复制 ' + selected.length + ' 条卡密');
      });
    }

    function openBatchNoteModal() {
      if (selected.length === 0) {
        alert('请先选择卡密');
        return;
      }
      document.getElementById('batchNoteModal').classList.add('active');
      document.getElementById('batchNoteInput').value = '';
    }

    function closeBatchNoteModal(e) {
      if (e && e.target !== e.currentTarget) return;
      document.getElementById('batchNoteModal').classList.remove('active');
    }

    function applyBatchNote() {
      const note = document.getElementById('batchNoteInput').value.trim();
      if (!note) {
        alert('请输入备注内容');
        return;
      }
      selected.forEach(i => {
        cards[i].note = note;
      });
      saveToStorage();
      closeBatchNoteModal();
      render();
    }

    function copyAndMark(index) {
      const c = cards[index];
      navigator.clipboard.writeText(c.kami).then(() => {
        if (c.status === '可用') {
          c.status = '已用';
          saveToStorage();
          render();
        }
      });
    }

    let editingIndex = -1;

    function saveToStorage() {
      localStorage.setItem('kamiCards', JSON.stringify(cards));
    }

    function render() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const typeFilter = document.getElementById('typeFilter').value;
      const statusFilter = document.getElementById('statusFilter').value;

      const filtered = cards.filter(c => {
        const matchSearch = c.kami.toLowerCase().includes(search) || (c.note && c.note.toLowerCase().includes(search));
        const matchType = !typeFilter || c.type === typeFilter;
        const matchStatus = !statusFilter || c.status === statusFilter;
        return matchSearch && matchType && matchStatus;
      });

      const tbody = document.getElementById('tbody');
      const empty = document.getElementById('empty');
      const table = document.getElementById('table');

      if (filtered.length === 0) {
        table.style.display = 'none';
        empty.style.display = 'block';
        return;
      }

      table.style.display = 'table';
      empty.style.display = 'none';

      tbody.innerHTML = filtered.map((c, i) => {
        const realIndex = cards.indexOf(c);
        const badgeClass = c.type === '时间' ? 'badge-time' : 'badge-count';
        const statusClass = c.status === '可用' ? 'badge-success' : 'badge-default';
        const rowClass = c.status === '已用' ? 'class="row-used"' : '';
        const checked = selected.includes(realIndex) ? 'checked' : '';
        const dis = c.status === '已用' ? 'disabled' : '';
        return `
          <tr ${rowClass}>
            <td><input type="checkbox" ${checked} ${dis} onclick="toggleSelect(${realIndex})"></td>
            <td>${escapeHtml(c.kami)} <span class="copy-btn" onclick="copyAndMark(${realIndex})">📋</span></td>
            <td><span class="badge ${badgeClass}">${c.type}</span></td>
            <td>${escapeHtml(c.note || '')}</td>
            <td><span class="badge ${statusClass}">${c.status}</span></td>
            <td class="actions">
              <button class="btn btn-small btn-edit" onclick="edit(${realIndex})">编辑</button>
              <button class="btn btn-small btn-del" onclick="del(${realIndex})">删除</button>
            </td>
          </tr>
        `;
      }).join('');
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function copy(text) {
      navigator.clipboard.writeText(text).then(() => {
        alert('已复制: ' + text);
      });
    }

    function openModal(index = -1) {
      editingIndex = index;
      document.getElementById('modalOverlay').classList.add('active');
      document.getElementById('modalTitle').textContent = index === -1 ? '添加卡密' : '编辑卡密';

      if (index === -1) {
        document.getElementById('kamiInput').value = '';
        document.getElementById('typeInput').value = '时间';
        document.getElementById('noteInput').value = '';
        document.getElementById('statusInput').value = '可用';
      } else {
        const c = cards[index];
        document.getElementById('kamiInput').value = c.kami;
        document.getElementById('typeInput').value = c.type;
        document.getElementById('noteInput').value = c.note || '';
        document.getElementById('statusInput').value = c.status;
      }
    }

    function closeModal(e) {
      if (e && e.target !== e.currentTarget) return;
      document.getElementById('modalOverlay').classList.remove('active');
    }

    function edit(index) {
      openModal(index);
    }

    function del(index) {
      if (confirm('确定删除这条卡密？')) {
        cards.splice(index, 1);
        saveToStorage();
        render();
      }
    }

    function save() {
      const kami = document.getElementById('kamiInput').value.trim();
      const type = document.getElementById('typeInput').value;
      const note = document.getElementById('noteInput').value.trim();
      const status = document.getElementById('statusInput').value;

      if (!kami) {
        alert('请输入卡密');
        return;
      }

      const card = { kami, type, note, status };

      if (editingIndex === -1) {
        cards.unshift(card);
      } else {
        cards[editingIndex] = card;
      }

      saveToStorage();
      closeModal();
      render();
    }

    render();
  </script>
</body>
</html>
